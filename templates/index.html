<!DOCTYPE html>
<html>
<head>
    <title>My Todo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .todo-list {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .todo-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .add-form {
            display: flex;
            margin-top: 20px;
            gap: 10px;
        }
        .add-form input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .add-btn {
            background: #44aa44;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="todo-list">
        <h1>My Todo App 📝</h1>

        {% for todo in todos %}
        <div class="todo-item">
            <span>{{ todo[1] }}</span>
            <a href="/delete/{{ todo[0] }}">
                <button class="delete-btn">Delete</button>
            </a>
        </div>
        {% endfor %}

        <form action="/add" method="POST" class="add-form">
            <input type="text" name="task" placeholder="Add new todo...">
            <button type="submit" class="add-btn">Add</button>
        </form>
    </div>
</body>
</html>
